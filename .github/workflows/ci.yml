name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint
        run: ruff check src/ tests/
      - name: Unit tests (skip slow + integration)
        run: pytest tests/ -v -m "not slow and not integration"

  slow:
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Slow tests (HF downloads, no DB)
        run: pytest tests/test_pipeline.py -v -m slow

  integration:
    runs-on: ubuntu-latest
    needs: unit
    services:
      oracle:
        image: gvenzl/oracle-free:latest
        env:
          ORACLE_PASSWORD: onnx2oracle
        ports:
          - "1521:1521"
        options: >-
          --health-cmd "healthcheck.sh"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 60
          --health-start-period 180s
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Integration
        env:
          ORACLE_DSN: "system/onnx2oracle@localhost:1521/FREEPDB1"
        run: pytest tests/test_loader_integration.py --run-integration -v -s
